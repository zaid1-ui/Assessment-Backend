<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Manager — API Console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="app">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="brand">
          <span class="brand-mark">▣</span>
          <span class="brand-text">Task<strong>Manager</strong></span>
        </div>

        <nav class="nav">
          <button class="nav-item is-active" data-entity="projects">
            <span class="nav-icon">◧</span> Projects
          </button>
          <button class="nav-item" data-entity="tasks">
            <span class="nav-icon">☑</span> Tasks
          </button>
          <button class="nav-item" data-entity="users">
            <span class="nav-icon">◍</span> Users
          </button>
          <button class="nav-item" data-entity="comments">
            <span class="nav-icon">◐</span> Comments
          </button>
        </nav>

        <div class="sidebar-footer">
          <span class="mono muted">v1.0 · dual-backend</span>
        </div>
      </aside>

      <!-- Main -->
      <main class="main">
        <!-- Request line / backend switcher -->
        <div class="request-bar">
          <div class="request-line mono">
            <span id="methodLabel" class="method">GET</span>
            <span id="requestPath" class="path">/api/projects</span>
            <span class="arrow">→</span>
            <select id="backendSelect" class="backend-select mono">
              <option value="flask">localhost:5000 (Flask)</option>
              <option value="fastapi">localhost:8000 (FastAPI)</option>
            </select>
            <span id="statusDot" class="status-dot" title="Checking...">●</span>
            <span id="statusText" class="mono muted status-text"
              >checking…</span
            >
          </div>
          <button id="editBaseUrl" class="link-btn mono">edit URLs</button>
        </div>

        <!-- Session auth bar -->
        <div id="authBar" class="auth-bar">
          <div id="authLoggedOut" class="auth-group">
            <input id="authUsername" class="auth-input" type="text" placeholder="username" autocomplete="username" />
            <input id="authPassword" class="auth-input" type="password" placeholder="password" autocomplete="current-password" />
            <button id="loginBtn" class="btn btn-primary btn-sm">Log in</button>
            <span class="mono muted auth-hint">no account? create one under Users</span>
          </div>
          <div id="authLoggedIn" class="auth-group hidden">
            <span class="mono">logged in as <strong id="authUserLabel"></strong></span>
            <button id="logoutBtn" class="btn btn-sm">Log out</button>
          </div>
          <span id="authError" class="auth-error mono hidden"></span>
        </div>

        <!-- Comments are only listable per-task on this API — pick one -->
        <div id="taskSelectorBar" class="task-selector-bar hidden">
          <label class="mono muted" for="commentTaskSelect"
            >Viewing comments for task:</label
          >
          <select id="commentTaskSelect"></select>
        </div>

        <!-- Toolbar -->
        <div class="toolbar">
          <h1 id="entityTitle">Projects</h1>
          <div class="toolbar-actions">
            <input
              id="searchInput"
              type="text"
              placeholder="Search…"
              class="search-input"
            />
            <div id="filterSlot" class="filter-slot"></div>
            <button id="createBtn" class="btn btn-primary">+ New</button>
          </div>
        </div>

        <!-- Content -->
        <div id="tableWrap" class="table-wrap">
          <table class="data-table" id="dataTable">
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
          </table>
          <div id="emptyState" class="empty-state hidden">
            <p class="empty-title">Nothing here yet</p>
            <p class="empty-sub">
              Create one to get started, or check your backend connection above.
            </p>
          </div>
          <div id="loadingState" class="loading-state hidden">
            <span class="mono">loading…</span>
          </div>
          <div id="errorState" class="error-state hidden">
            <p class="mono" id="errorText"></p>
          </div>
        </div>

        <!-- Pagination (only shown for paginated entities, i.e. Tasks) -->
        <div class="pagination" id="paginationBar">
          <button id="prevPage" class="btn btn-ghost">← Prev</button>
          <span id="pageInfo" class="mono muted">Page 1</span>
          <button id="nextPage" class="btn btn-ghost">Next →</button>
          <select id="pageSizeSelect" class="mono page-size-select">
            <option value="10">10 / page</option>
            <option value="20" selected>20 / page</option>
            <option value="50">50 / page</option>
          </select>
        </div>
        <div class="pagination" id="countBar">
          <span id="countInfo" class="mono muted"></span>
        </div>
      </main>
    </div>

    <!-- Form modal -->
    <div id="modalOverlay" class="modal-overlay hidden">
      <div class="modal">
        <div class="modal-header">
          <h2 id="modalTitle">New Item</h2>
          <button id="modalClose" class="icon-btn">✕</button>
        </div>
        <form id="modalForm" class="modal-form"></form>
      </div>
    </div>

    <!-- Base URL config modal -->
    <div id="urlModalOverlay" class="modal-overlay hidden">
      <div class="modal modal-small">
        <div class="modal-header">
          <h2>Backend base URLs</h2>
          <button id="urlModalClose" class="icon-btn">✕</button>
        </div>
        <div class="modal-form">
          <label
            >Flask base URL
            <input id="flaskUrlInput" type="text" class="mono" />
          </label>
          <label
            >FastAPI base URL
            <input id="fastapiUrlInput" type="text" class="mono" />
          </label>
          <button id="saveUrls" class="btn btn-primary" type="button">
            Save
          </button>
        </div>
      </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast hidden"></div>

    <script src="js/app.js"></script>
  </body>
</html>
